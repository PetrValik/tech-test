# Runs only V1 (enterprise layered MVC API) with its own isolated database.
# V1 schema is bootstrapped from database/init.sql (no EF Core migrations).
# Usage: docker compose -f docker-compose.v1.yml up
# Secrets: copy .env.example to .env and fill in DB_PASSWORD before running.

services:
  api:
    build: ./src
    container_name: order-api-v1
    ports:
      - "8000:8080"
    environment:
      - OrderConnectionString=server=database;port=3306;database=orders;user=order-service;password=${DB_PASSWORD:?DB_PASSWORD is required - copy .env.example to .env};SslMode=None
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Authority=${JWT_AUTHORITY:-}
      - Jwt__Audience=${JWT_AUDIENCE:-orders-api}
    depends_on:
      database:
        condition: service_healthy
    links:
      - "database:database"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  database:
    image: mysql:5.7
    container_name: order-db-v1
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:delegated
      - db-v1-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_DATABASE=orders
      - MYSQL_USER=order-service
      - MYSQL_PASSWORD=${DB_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --lower_case_table_names=1
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-v1-data:
